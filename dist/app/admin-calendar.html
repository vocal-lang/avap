<body class="admin-page auth-pending">
    <div class="admin-top-bar">
        <h1 class="admin-top-bar__title">AVAP Admin — Events</h1>
        <div class="admin-top-bar__actions">
            <button id="backToAdminButton" type="button" class="admin-top-bar__btn">Back to Admin</button>
            <button id="logout-button" type="button" class="admin-top-bar__btn admin-top-bar__btn--logout" aria-label="Log out">Log Out</button>
        </div>
    </div>
    <div class="container">
        <main class="page-content">
            <!-- Calendar (reuses existing renderMonthlyCalendar via events-calendar ID) -->
            <div class="content-card">
                <h2>Events Calendar</h2>
                <p>Select a date to view its events, or use the form below to add or remove events.</p>
                <div class="events-calendar__header" aria-label="Calendar month navigation">
                    <button id="calendar-prev" type="button" class="events-calendar__nav-btn" aria-label="Previous month">Previous</button>
                    <span id="calendar-month-label" class="events-calendar__month-label" aria-live="polite"></span>
                    <button id="calendar-next" type="button" class="events-calendar__nav-btn" aria-label="Next month">Next</button>
                </div>
                <div id="events-calendar" class="events-calendar" aria-label="Monthly calendar"></div>
                <div id="events-calendar-list" class="events-calendar-list" aria-label="Events for this month"></div>
            </div>

            <!-- Add Event Form (skeleton — no logic yet) -->
            <div class="content-card">
                <h2>Add Event</h2>
                <form id="add-event-form" class="admin-event-form" aria-label="Add a new event">
                    <input type="hidden" id="editing-event-id" value="" />
                    <input type="hidden" id="editing-event-collection" value="" />
                    <div class="admin-event-form__field">
                        <label for="event-title">Title</label>
                        <input type="text" id="event-title" name="title" placeholder="Event title" required />
                    </div>
                    <div class="admin-event-form__field">
                        <label for="event-date">Date</label>
                        <input type="date" id="event-date" name="date" required />
                    </div>
                    <div class="admin-event-form__field">
                        <label for="event-time">Time</label>
                        <input type="time" id="event-time" name="time" />
                    </div>
                    <div class="admin-event-form__field">
                        <label for="event-county">County</label>
                        <input type="text" id="event-county" name="county" placeholder="County name" />
                    </div>
                    <div class="admin-event-form__field">
                        <label for="event-location">Location</label>
                        <input type="text" id="event-location" name="location" placeholder="Address or venue" />
                    </div>
                    <div class="admin-event-form__field">
                        <label for="event-website">Website</label>
                        <input type="text" id="event-website" name="website" inputmode="url" autocomplete="url" placeholder="example.org/event or https://example.org/event" />
                    </div>
                    <div class="admin-event-form__field">
                        <label for="event-description">Description</label>
                        <textarea id="event-description" name="description" rows="3" placeholder="Brief description of the event"></textarea>
                    </div>
                    <div class="admin-event-form__actions">
                        <button type="submit" id="save-event-button" class="admin-top-bar__btn admin-top-bar__btn--primary">Add Event</button>
                        <button type="button" id="cancel-edit-event-button" class="admin-top-bar__btn" hidden>Cancel Edit</button>
                    </div>
                    <p id="event-form-status" class="admin-event-form__status" aria-live="polite"></p>
                </form>
            </div>

        </main>
    </div>
</body>
</html>
